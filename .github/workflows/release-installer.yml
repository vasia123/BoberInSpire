name: Build and Publish Installer

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    # Important: use a self-hosted Windows runner with STS2 + Godot installed.
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure Inno Setup is available
        shell: powershell
        run: |
          if (-not (Get-Command iscc -ErrorAction SilentlyContinue)) {
            choco install innosetup -y
          }
          iscc /?

      - name: Build release bundle
        shell: cmd
        run: build.bat

      - name: Build installer EXE
        shell: cmd
        run: iscc installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoberInSpire-setup
          path: dist/BoberInSpire_Setup_*.exe
          if-no-files-found: error

      - name: Attach installer to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BoberInSpire_Setup_*.exe
